name: Check Plugin Skill Sync

on:
  push:
    branches: [main]
    paths:
      - "plugins/claude-code/skills/drawio/SKILL.md"
      - "plugins/codex/drawio/skills/drawio/SKILL.md"
  pull_request:
    paths:
      - "plugins/claude-code/skills/drawio/SKILL.md"
      - "plugins/codex/drawio/skills/drawio/SKILL.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skill-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Verify Codex SKILL.md is byte-identical to the Claude Code copy
        run: |
          claude="plugins/claude-code/skills/drawio/SKILL.md"
          codex="plugins/codex/drawio/skills/drawio/SKILL.md"

          if [ ! -f "$codex" ]; then
            echo "$codex does not exist (Codex plugin not present) — nothing to check."
            exit 0
          fi

          if cmp -s "$claude" "$codex"; then
            echo "OK: $codex is byte-identical to $claude."
          else
            echo "::error file=$codex::Must be byte-identical to $claude — mirror the edit to both copies."
            diff -u "$claude" "$codex" || true
            exit 1
          fi
